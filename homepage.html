<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- daisy Ui & tailwind cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- geist font cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css connected -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-blue-50/50">
    <header class="max-w-full mx-auto">
        <nav class="flex flex-col gap-2 md:justify-between md:flex-row items-center bg-white px-6 py-2 ">
            <div class="flex justify-center items-center gap-3">
                <img src="./assets/github-logo.png" width="30">
                <h3 class="clr-blck font-semibold text-xl">GitHub Issues Tracker</h3>
            </div>
            <div class="join">
                <div>
                    <label class="input validator join-item">
                        <input id="search" type="text" placeholder="Search issues.." required />
                    </label>
                    <div class="validator-hint hidden"></div>
                </div>
                <button id="khujteche" class="btn btn-primary join-item">+ New Issue</button>
            </div>
        </nav>
    </header>

    <main class="max-w-[80%] mx-auto mt-6 pb-10">

        <!-- button section -->
        <section class="flex justify-start items-center bg-white rounded-lg p-4 gap-2 mb-4">
            <button id="all" onclick="pressAll()" class="btn ">All</button>
            <button id="open" onclick="pressOpen()" class="btn">Open</button>
            <button id="close" onclick="pressClose()" class="btn">Close</button>
        </section>

        <!-- counter -->
        <section class="flex flex-wrap gap-1.5 justify-between items-center bg-white rounded-lg p-4 mb-14">
            <div class="flex justify-center items-center gap-2">
                <img src="./assets/Aperture.png">
                <div>
                    <h1 class="text-[#1F2937] font-semibold text-xl"><span id="count">0</span> Issues</h1>
                    <p class="clr-drk">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex justify-center items-center gap-2">
                <div class="rounded-full bg-green-600 w-2.5 h-2.5"></div>
                <p>open</p>
                <div class="rounded-full bg-purple-600 w-2.5 h-2.5 "></div>
                <p>Closed</p>
            </div>
        </section>


        <!-- spinner -->
         <section id="spinner" class="flex justify-center items-center">
            <span class="loading loading-spinner text-primary"></span>
         </section>

        <!-- all cards -->
        <section id="all-card-section"
            class="grid [@media(max-width:767px)_and_(min-width:380px)]:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 ">
        </section>

        <!-- open cards -->
        <section id="open-card-section"
            class="grid [@media(max-width:767px)_and_(min-width:380px)]:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3">
        </section>

        <!-- close cards -->
        <section id="close-card-section"
            class="grid [@media(max-width:767px)_and_(min-width:380px)]:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3">
        </section>

        <section id="search-card-section"
            class="grid [@media(max-width:767px)_and_(min-width:380px)]:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3">
        </section>

        <!-- modal section -->
        <section>
            <dialog id="my_modal_5" class="modal modal-middle">
            </dialog>
        </section>
    </main>
    <script src="./js/jadu.js"></script>
</body>

</html>
