<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- daisy Ui & tailwind cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- geist font cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css connected -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-blue-50/50">
    <header class="max-w-full mx-auto">
        <nav class="flex flex-col gap-2 md:justify-between md:flex-row items-center bg-white px-6 py-2 ">
            <div class="flex justify-center items-center gap-3">
                <img src="./assets/github-logo.png" width="30">
                <h3 class="clr-blck font-semibold text-xl">GitHub Issues Tracker</h3>
            </div>
            <div class="join">
                <div>
                    <label class="input validator join-item">
                        <input type="text" placeholder="Search issues.." required />
                    </label>
                    <div class="validator-hint hidden"></div>
                </div>
                <button class="btn btn-primary join-item">+ New Issue</button>
            </div>
        </nav>
    </header>

    <main class="max-w-[80%] mx-auto mt-6">

        <!-- button section -->
        <section class="flex justify-start items-center bg-white rounded-lg p-4 gap-2 mb-4">
            <button class="btn btn-primary">All</button>
            <button class="btn">Open</button>
            <button class="btn">Close</button>
        </section>

        <!-- counter -->
        <section class="flex justify-between items-center bg-white rounded-lg p-4 mb-14">
            <div class="flex justify-center items-center gap-2">
                <img src="./assets/Aperture.png">
                <div>
                    <h1 class="text-[#1F2937] font-semibold text-xl">50 Issues</h1>
                    <p class="clr-drk">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex justify-center items-center gap-2">
                <div class="rounded-full bg-green-600 w-2.5 h-2.5"></div>
                <p>open</p>
                <div class="rounded-full bg-purple-600 w-2.5 h-2.5 "></div>
                <p>Closed</p>
            </div>
        </section>

        <section class="grid grid-cols-4">
            <div class="bg-white p-3 border-t-3 border-green-600 rounded-xl space-y-1">
                <div class="flex justify-between items-center">
                    <img src="./assets/Open-Status.png">
                    <button class="btn btn-soft btn-error rounded-2xl ">HIGH</button>
                </div>
                <h1 class="font-semibold clr-blck">Fix navigation menu on mobile devices</h1>
                <p class="clr-drk text-[12px] font-medium">The navigation menu doesn't collapse properly on mobile devices...</p>
                <div>
                    <button class="btn btn-soft btn-error text-[12px] rounded-2xl p-1 border border-red-200"><img src="./assets/BugDroid.png"> BUG</button>
                    <button class="btn btn-soft btn-warning text-[12px] rounded-2xl p-1 border border-amber-200"><img src="./assets/Lifebuoy.png"> HELP WANTED</button> 
                </div>
                <hr class=" text-gray-200 my-3">
                <p class="clr-drk text-[12px] ">#1 by john_doe</p>
                <p class="clr-drk text-[12px] ">1/15/2024</p>
            </div>
        </section>
    </main>
    <script src="./js/jadu.js"></script>
</body>

</html>
