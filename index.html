<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login || github tracker</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- daisy Ui & tailwind cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- geist font cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css connected -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="flex justify-center items-center bg-gray-50 pt-6">
    <section class="py-7 px-12 bg-white rounded-xl">
        <div class="flex flex-col items-center justify-center">
            <img src="./assets/github-logo.png">
            <h1 class="clr-blck font-semibold text-2xl mt-5 mb-1">GitHub Issues Tracker</h1>
            <p class="clr-drk">Sign in to manage your issues</p>
        </div>
        <div class="mt-7">
            <fieldset class="fieldset">
                <label class="label text-[#3D3746] font-medium">Username</label>
                <input type="text" class="input" placeholder="Enter Username" />
                <p class="text-primary">Default: admin</p>
                <label class="label">Password</label>
                <input type="password" class="input" placeholder="Password" />
                <p class="text-primary">Default: admin123</p>
                <button class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </div>

        <div class="divider">OR</div>
        <p class="clr-drk font-normal text-sm text-center">Demo Credentials:</p>
        <div class="bg-gray-50 flex flex-col justify-center items-center mt-3 py-5 rounded-2xl">
            <p class="text-[#64748B] text-sm"><span class="font-semibold clr-blck">Username:</span> admin</p>
            <p class="text-[#64748B] text-sm"><span class="font-semibold clr-blck">Password:</span> admin123</p>
        </div>

    </section>
</body>

</html>
